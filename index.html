<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryxi Client | Ultimate Minecraft Launcher</title>
    <style>
        :root {
            --bg-main: #050508;
            --bg-card: #0d0e12;
            --accent-cyan: #00f0ff;
            --accent-blue: #0072ff;
            --text-primary: #ffffff;
            --text-secondary: #8f9cae;
            --border-glow: rgba(0, 240, 255, 0.15);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* High-quality abstract gaming grid lines */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }

        .hero-container {
            position: relative;
            z-index: 2;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-top: 2px solid var(--accent-cyan);
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            max-width: 550px;
            width: 90%;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.8), 0 0 40px var(--border-glow);
        }

        .badge {
            background: rgba(0, 240, 255, 0.08);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: var(--accent-cyan);
            padding: 6px 14px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin: 0 0 16px 0;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 40%, var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 0 auto 40px auto;
            max-width: 440px;
        }

        /* Smart Dynamic Action Button */
        .primary-download-wrapper {
            margin-bottom: 35px;
        }

        .main-btn {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: #000000;
            padding: 18px 45px;
            font-size: 1.15rem;
            font-weight: 800;
            text-decoration: none;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s;
            cursor: pointer;
        }

        .main-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.5);
        }

        .detected-os-text {
            display: block;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 12px;
            font-weight: 500;
        }

        /* Multiplatform Grid Selection Layout */
        .platform-divider {
            display: flex;
            align-items: center;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 40px 0 20px 0;
        }

        .platform-divider::before, .platform-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }
        .platform-divider span { padding: 0 15px; }

        .platform-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .platform-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 14px 10px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.85rem;
            transition: background 0.2s, border 0.2s, transform 0.1s;
        }

        .platform-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 240, 255, 0.3);
            transform: scale(1.02);
        }

        .platform-card span {
            display: block;
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 6px;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="hero-container">
        <div class="badge">Minecraft Client</div>
        <h1>RYXI LAUNCHER</h1>
        <p class="subtitle">Experience high performance, optimized FPS stability, and a fully custom modding workspace straight out of the box.</p>
        
        <div class="primary-download-wrapper">
            <!-- HARDCODED TO BASE WINDOWS INSTALLER LINK AS DEFAULT FALLBACK -->
            <a href="https://github.com" id="dynamic-download-link" download class="main-btn">
                <span>Download Ryxi Launcher</span>
            </a>
            <span id="os-badge" class="detected-os-text">Detecting platform configuration...</span>
        </div>

        <div class="platform-divider">
            <span>All Target Distributions</span>
        </div>

        <!-- HARDCODED LINKS IN GRID MATRIX TO BYPASS SCRIPT LATENCY BLOCKS -->
        <div class="platform-grid">
            <a href="https://github.com" id="grid-win" download class="platform-card">
                Windows
                <span>Setup .exe</span>
            </a>
            <a href="https://github.com" id="grid-mac" download class="platform-card">
                macOS
                <span>Universal .zip</span>
            </a>
            <a href="https://github.com" id="grid-linux" download class="platform-card">
                Linux
                <span>Universal .zip</span>
            </a>
        </div>
    </div>

    <script>
        // Real Live GitHub Releases Links Matrix
        const links = {
            win: "https://github.com",
            mac: "https://github.com",
            linux: "https://github.com"
        };

        const mainBtnLink = document.getElementById('dynamic-download-link');
        const osBadge = document.getElementById('os-badge');
        
        // Comprehensive multiplatform verification engine
        const platform = (navigator.userAgentData?.platform || navigator.platform || "").toLowerCase();
        const userAgent = navigator.userAgent.toLowerCase();
        
        if (platform.includes("win") || userAgent.includes("windows")) {
            mainBtnLink.href = links.win;
            osBadge.innerText = "Recommended Setup Detected: Windows PC (.exe)";
        } else if (platform.includes("mac") || userAgent.includes("macintosh") || userAgent.includes("mac os")) {
            mainBtnLink.href = links.mac;
            osBadge.innerText = "Recommended Setup Detected: macOS Archive (.zip)";
        } else if (platform.includes("linux") || userAgent.includes("linux")) {
            mainBtnLink.href = links.linux;
            osBadge.innerText = "Recommended Setup Detected: Linux Archive (.zip)";
        } else {
            // Default fallback safe state
            mainBtnLink.href = links.win;
            osBadge.innerText = "Defaulting download asset package to Windows Setup (.exe)";
        }
    </script>
</body>
</html>
